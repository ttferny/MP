<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Security Dashboard</title>
    
    <!-- ADD YOUR GROUP'S CSS LINK HERE -->
    <link rel="stylesheet" href="/css/spf.css">
    
    <!-- Import Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>Email Authentication & Threat Statistics</h1>
    </div>

    <!-- High-level statistics -->
    <div class="summary-cards">
        <div class="card">
            <h3>Total Emails Analyzed</h3>
            <div class="value" id="totalAnalyzed">Loading...</div>
        </div>
        <div class="card">
            <h3>Average Risk Score</h3>
            <div class="value" id="avgRiskScore">Loading...</div>
        </div>
        <div class="card">
            <h3>Overall System Health</h3>
            <div class="value" id="systemHealth" style="color: #27ae60;">Active</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-container">
            <canvas id="authChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="threatChart"></canvas>
        </div>
    </div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
